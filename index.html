<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підручник для 8 класу (В. Бар'яхтар) - контрольні запитання</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .physics-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
        .p-btn {
            transition: all 0.2s ease;
        }
        .p-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans">

    <!-- Header -->
    <header class="physics-gradient text-white py-12 px-4 shadow-lg text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-bold mb-2 tracking-tight">Фізика 8 клас</h1>
            <p class="text-xl opacity-90 font-light text-blue-100">Контрольні запитання</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 md:p-12">
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <script>
                const totalParagraphs = 42;
                for(let i = 1; i <= totalParagraphs; i++) {
                    document.write(`
                        <a href="${i}.html" class="p-btn bg-white border border-blue-100 text-blue-800 font-semibold py-6 px-4 rounded-2xl text-center shadow-sm flex flex-col items-center justify-center">
                            <span class="text-3xl font-bold">§ ${i}</span>
                        </a>
                    `);
                }
            </script>
        </div>

    </main>

    <footer class="text-center py-12 text-gray-400 text-sm mt-auto border-t border-gray-100 bg-white">
        <p>Фізика 8 клас</p>
    </footer>

</body>
</html>
